<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WIMPS – MIPS Simulator</title>
    <script>
      // Redirect unknown paths to index.html, encoding the path as a query
      // parameter so the SPA can restore it on load.
      // pathSegmentsToKeep = 0 for a custom domain at root (no subdirectory).
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
