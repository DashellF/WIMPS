<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WIMPS – MIPS Simulator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
      // Restore path encoded by 404.html (spa-github-pages redirect trick)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));

      // Paint the theme background before the JS bundle loads, so reloads show the
      // correct surface instead of a white flash. Mirrors helpers/themeHelper.ts:
      // any cookie value other than "light" is treated as dark.
      (function () {
        var dark = !/(^|;\s*)theme=light(;|$)/.test(document.cookie);
        var de = document.documentElement;
        de.style.background = dark ? '#0b1020' : '#f1f5f9';
        // Mirrors skeletonColors() in src/components/Skeleton.tsx so the inline
        // shimmer matches the React skeletons that take over after mount.
        de.style.setProperty('--skeleton-base', dark ? '#1f2937' : '#e2e8f0');
        de.style.setProperty('--skeleton-highlight', dark ? '#334155' : '#f5f8fc');
        de.style.setProperty('--skeleton-border', dark ? '#1e293b' : '#e2e8f0');
      }());
    </script>
    <style>
      /* Pre-React loading state. The router hasn't booted yet, so this is a
         route-agnostic app shell (nav + content blocks). React's
         createRoot().render() replaces #root's children on mount, so it's
         removed automatically once the app boots and the per-route skeleton
         takes over. */
      #app-preloader { position: fixed; inset: 0; background: inherit; }
      #app-preloader .sk {
        display: block;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          var(--skeleton-base, #1f2937) 25%,
          var(--skeleton-highlight, #334155) 37%,
          var(--skeleton-base, #1f2937) 63%
        );
        background-size: 400% 100%;
        animation: app-shimmer 1.4s ease infinite;
      }
      #app-preloader .pl-nav {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 32px;
        border-bottom: 1px solid var(--skeleton-border, #1e293b);
      }
      #app-preloader .pl-nav-right { display: flex; align-items: center; gap: 18px; }
      #app-preloader .pl-hero {
        display: flex; flex-direction: column; align-items: center;
        padding: 100px 24px 80px; gap: 18px;
      }
      @keyframes app-shimmer {
        0% { background-position: 100% 50%; }
        100% { background-position: 0 50%; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-preloader .sk { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-preloader" aria-hidden="true">
        <div class="pl-nav">
          <span class="sk" style="width:92px;height:22px"></span>
          <span class="pl-nav-right">
            <span class="sk" style="width:46px;height:15px;border-radius:5px"></span>
            <span class="sk" style="width:46px;height:15px;border-radius:5px"></span>
            <span class="sk" style="width:46px;height:15px;border-radius:5px"></span>
            <span class="sk" style="width:84px;height:34px;border-radius:8px"></span>
          </span>
        </div>
        <div class="pl-hero">
          <span class="sk" style="width:min(620px,90%);height:46px;border-radius:10px"></span>
          <span class="sk" style="width:min(440px,80%);height:46px;border-radius:10px"></span>
          <span class="sk" style="width:min(480px,85%);height:18px;margin-top:14px"></span>
          <span class="sk" style="width:196px;height:50px;border-radius:10px;margin-top:24px"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
